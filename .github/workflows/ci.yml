name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      # The vendored SDK bundle is committed; verify it matches its manifest checksums.
      - name: Verify vendored SDK integrity
        run: node scripts/verify-vendor.mjs
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Install Chromium for shell E2E
        if: matrix.node == 20
        run: npx playwright install --with-deps chromium
      - name: Run Studio shell E2E
        if: matrix.node == 20
        run: npm run test:e2e -- --grep "renders the three versioned journeys"
      - name: Verify release tag matches Studio version
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run release:check -- "${{ github.ref_name }}"
