name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # The vendored SDK bundle is committed; verify it matches its manifest checksums.
      - name: Verify vendored SDK integrity
        run: node scripts/verify-vendor.mjs
      - run: npm run typecheck
      - run: npm run build
